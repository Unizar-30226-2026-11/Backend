asyncapi: 2.6.0
info:
  title: PSOFT Game WebSockets API
  version: 1.1.0
  description: |
    Especificacion actualizada de la API de WebSockets (Socket.IO) para lobby,
    juego, chat y recuperacion de sesion.

    Fuente de verdad: implementacion en handlers y GameService.

servers:
  production:
    url: localhost:3000
    protocol: ws
    description: Endpoint principal de conexiones Socket.IO

channels:
  # ==========================================
  # CLIENTE -> SERVIDOR
  # ==========================================
  client:lobby:join:
    description: El usuario se une al lobby indicado por su JWT (lobbyCode del token).
    publish:
      message:
        $ref: '#/components/messages/ClientLobbyJoin'

  client:lobby:leave:
    description: El usuario abandona voluntariamente el lobby actual.
    publish:
      message:
        $ref: '#/components/messages/EmptyMessage'

  client:lobby:start:
    description: El host solicita iniciar la partida.
    publish:
      message:
        $ref: '#/components/messages/ClientLobbyStart'

  client:game:action:
    description: Canal principal de acciones de juego (tipadas por actionType).
    publish:
      message:
        $ref: '#/components/messages/ClientGameAction'

  client:game:trigger_star:
    description: Solicita activar el evento de estrella fugaz.
    publish:
      message:
        $ref: '#/components/messages/LobbyCodeMessage'

  client:game:claim_star:
    description: Reclama la estrella activa para sumar puntos.
    publish:
      message:
        $ref: '#/components/messages/LobbyCodeMessage'

  client:game:end:
    description: Finaliza la partida y dispara calculo de ranking/recompensas.
    publish:
      message:
        $ref: '#/components/messages/LobbyCodeMessage'

  client:chat:send:
    description: Envia un mensaje de chat al lobby.
    publish:
      message:
        $ref: '#/components/messages/ClientChatSend'

  joinLobbyRoom:
    description: Evento legacy para unirse manualmente a una room de Socket.IO.
    publish:
      message:
        $ref: '#/components/messages/JoinLobbyRoom'

  # ==========================================
  # SERVIDOR -> CLIENTE
  # ==========================================
  server:error:
    description: Error de validacion, autenticacion o negocio.
    subscribe:
      message:
        $ref: '#/components/messages/ServerError'

  server:force_disconnect:
    description: Desconexion forzada (control de multipestana).
    subscribe:
      message:
        $ref: '#/components/messages/ServerForceDisconnect'

  server:lobby:state_updated:
    description: Estado completo del lobby en Redis.
    subscribe:
      message:
        $ref: '#/components/messages/ServerLobbyStateUpdated'

  server:lobby:recovered:
    description: Recuperacion de sesion en sala de espera.
    subscribe:
      message:
        $ref: '#/components/messages/ServerLobbyRecovered'

  server:lobby:player_reconnected:
    description: Notifica al resto que un jugador se ha reconectado al lobby.
    subscribe:
      message:
        $ref: '#/components/messages/ServerLobbyPlayerReconnected'

  server:session:recovered:
    description: Recuperacion de sesion con partida en curso.
    subscribe:
      message:
        $ref: '#/components/messages/ServerSessionRecovered'

  server:game:started:
    description: Snapshot publico inicial de partida + metadatos del tablero.
    subscribe:
      message:
        $ref: '#/components/messages/ServerGameStarted'

  server:game:state_updated:
    description: Estado publico actualizado tras una accion del juego.
    subscribe:
      message:
        $ref: '#/components/messages/ServerGameStateUpdated'

  server:game:private_hand:
    description: Mano privada del jugador (room personal userId).
    subscribe:
      message:
        $ref: '#/components/messages/ServerGamePrivateHand'

  server:game:ended:
    description: Resultado final de partida con ranking.
    subscribe:
      message:
        $ref: '#/components/messages/ServerGameEnded'

  server:economy:wallet_updated:
    description: Actualizacion de saldo para un usuario concreto.
    subscribe:
      message:
        $ref: '#/components/messages/ServerWalletUpdated'

  server:game:deck_reshuffled:
    description: Se ha reconstruido y barajado el mazo central desde descartes.
    subscribe:
      message:
        $ref: '#/components/messages/EmptyMessage'

  server:game:duel_available:
    description: El jugador puede seleccionar objetivo para duelo.
    subscribe:
      message:
        $ref: '#/components/messages/ServerDuelAvailable'

  server:game:minigame_start:
    description: Comienza minijuego de conflicto entre dos jugadores.
    subscribe:
      message:
        $ref: '#/components/messages/ServerMinigameStart'

  server:game:special_event:
    description: Evento especial del tablero (efectos, resoluciones y avisos).
    subscribe:
      message:
        $ref: '#/components/messages/ServerSpecialEvent'

  server:game:star_spawned:
    description: Aparece una estrella fugaz en tablero.
    subscribe:
      message:
        $ref: '#/components/messages/ServerStarSpawned'

  server:game:star_claimed:
    description: Un jugador ha reclamado la estrella.
    subscribe:
      message:
        $ref: '#/components/messages/ServerStarClaimed'

  server:chat:message_received:
    description: Mensaje de chat retransmitido al lobby.
    subscribe:
      message:
        $ref: '#/components/messages/ServerChatMessageReceived'

  game:started:
    description: Evento de UI para cambio de pantalla Lobby -> Game.
    subscribe:
      message:
        $ref: '#/components/messages/GameStarted'

components:
  messages:
    EmptyMessage:
      name: EmptyMessage
      title: Payload vacio
      payload:
        type: object
        additionalProperties: false

    LobbyCodeMessage:
      name: LobbyCodeMessage
      title: Lobby code payload
      payload:
        type: object
        properties:
          lobbyCode:
            type: string
            minLength: 4
            maxLength: 4
        required:
          - lobbyCode

    JoinLobbyRoom:
      name: JoinLobbyRoom
      title: Join room payload
      payload:
        type: string
        minLength: 4
        maxLength: 4

    ClientLobbyJoin:
      name: ClientLobbyJoin
      title: Join lobby payload
      description: |
        El backend no requiere payload para este evento.
        El lobbyCode se toma del JWT autenticado.
      payload:
        type: object
        additionalProperties: true

    ClientLobbyStart:
      name: ClientLobbyStart
      title: Start lobby payload
      payload:
        type: object
        properties:
          useDynamicPool:
            type: boolean
            default: true

    ClientGameAction:
      name: ClientGameAction
      title: Game action payload
      payload:
        type: object
        properties:
          lobbyCode:
            type: string
            minLength: 4
            maxLength: 4
          actionType:
            type: string
            enum:
              - SEND_STORY
              - SUBMIT_CARD
              - CAST_VOTE
              - NEXT_ROUND
              - STELLA_SUBMIT_MARKS
              - STELLA_REVEAL_MARK
              - RESOLVE_DUEL
          payload:
            type: object
            additionalProperties: true
            description: Datos especificos de la accion.
        required:
          - lobbyCode
          - actionType

    ClientChatSend:
      name: ClientChatSend
      title: Chat send payload
      payload:
        type: object
        properties:
          lobbyCode:
            type: string
            minLength: 4
            maxLength: 4
          text:
            type: string
            minLength: 1
            maxLength: 255
        required:
          - lobbyCode
          - text

    ServerError:
      name: ServerError
      title: Error payload
      payload:
        type: object
        properties:
          message:
            type: string
          code:
            type: string
        required:
          - message

    ServerForceDisconnect:
      name: ServerForceDisconnect
      title: Force disconnect payload
      payload:
        type: object
        properties:
          message:
            type: string
        required:
          - message

    ServerLobbyStateUpdated:
      name: ServerLobbyStateUpdated
      title: Lobby state payload
      payload:
        type: object
        properties:
          lobbyCode:
            type: string
          hostId:
            type: string
          name:
            type: string
          maxPlayers:
            type: integer
          engine:
            type: string
          isPrivate:
            type: boolean
          status:
            type: string
          players:
            type: array
            items:
              type: string
        required:
          - lobbyCode
          - hostId
          - players

    ServerLobbyRecovered:
      name: ServerLobbyRecovered
      title: Lobby recovered payload
      payload:
        type: object
        properties:
          lobbyCode:
            type: string
          lobby:
            type: object
            additionalProperties: true
        required:
          - lobbyCode
          - lobby

    ServerLobbyPlayerReconnected:
      name: ServerLobbyPlayerReconnected
      title: Lobby player reconnected payload
      payload:
        type: object
        properties:
          user:
            type: string
          message:
            type: string
        required:
          - user
          - message

    ServerSessionRecovered:
      name: ServerSessionRecovered
      title: Session recovered payload
      payload:
        type: object
        properties:
          lobbyCode:
            type: string
          state:
            type: object
            additionalProperties: true
        required:
          - lobbyCode
          - state

    ServerGameStarted:
      name: ServerGameStarted
      title: Game started payload
      payload:
        type: object
        properties:
          state:
            type: object
            additionalProperties: true
          board:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              url_image:
                type: string
            required:
              - id
              - name
              - url_image
          message:
            type: string
        required:
          - state
          - board
          - message

    ServerGameStateUpdated:
      name: ServerGameStateUpdated
      title: Game state updated payload
      payload:
        type: object
        properties:
          state:
            type: object
            additionalProperties: true
          lastAction:
            type: string
        required:
          - state

    ServerGamePrivateHand:
      name: ServerGamePrivateHand
      title: Private hand payload
      payload:
        type: object
        properties:
          hand:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                url_image:
                  type: string
              required:
                - id
                - url_image
          board:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              url_image:
                type: string
            required:
              - id
              - name
              - url_image
        required:
          - hand
          - board

    ServerGameEnded:
      name: ServerGameEnded
      title: Game ended payload
      payload:
        type: object
        properties:
          ranking:
            type: array
            items:
              type: object
              properties:
                playerId:
                  type: string
                points:
                  type: number
                position:
                  type: integer
                reward:
                  type: integer
              required:
                - playerId
                - points
                - position
                - reward
          error:
            type: string
        required:
          - ranking

    ServerWalletUpdated:
      name: ServerWalletUpdated
      title: Wallet updated payload
      payload:
        type: object
        properties:
          balance:
            type: integer
        required:
          - balance

    ServerDuelAvailable:
      name: ServerDuelAvailable
      title: Duel available payload
      payload:
        type: object
        properties:
          challengerId:
            type: string
        required:
          - challengerId

    ServerMinigameStart:
      name: ServerMinigameStart
      title: Minigame start payload
      payload:
        type: object
        properties:
          player1:
            type: string
          player2:
            type: string
          type:
            type: integer
          duration:
            type: integer
          isDuel:
            type: boolean
        required:
          - player1
          - player2
          - type
          - duration
          - isDuel

    ServerSpecialEvent:
      name: ServerSpecialEvent
      title: Special event payload
      description: |
        Payload variable segun evento especial.
        Ejemplos: ODD/EVEN, SHUFFLE, EQUILIBRIUM, STELLA_SCORE_SWAP,
        CONFLICT_RESOLVED, CONFLICT_CANCELLED.
      payload:
        type: object
        additionalProperties: true

    ServerStarSpawned:
      name: ServerStarSpawned
      title: Star spawned payload
      payload:
        type: object
        properties:
          starId:
            type: string
          path:
            type: object
            properties:
              start:
                type: object
                properties:
                  x:
                    type: number
                  y:
                    type: number
                required:
                  - x
                  - y
              end:
                type: object
                properties:
                  x:
                    type: number
                  y:
                    type: number
                required:
                  - x
                  - y
            required:
              - start
              - end
          duration:
            type: integer
        required:
          - starId
          - path
          - duration

    ServerStarClaimed:
      name: ServerStarClaimed
      title: Star claimed payload
      payload:
        type: object
        properties:
          winnerId:
            type: string
          newScores:
            type: object
            additionalProperties:
              type: number
        required:
          - winnerId
          - newScores

    ServerChatMessageReceived:
      name: ServerChatMessageReceived
      title: Chat message payload
      payload:
        type: object
        properties:
          username:
            type: string
          text:
            type: string
          timestamp:
            type: string
            format: date-time
        required:
          - username
          - text
          - timestamp

    GameStarted:
      name: GameStarted
      title: UI game started payload
      payload:
        type: object
        properties:
          lobbyCode:
            type: string
        required:
          - lobbyCode
