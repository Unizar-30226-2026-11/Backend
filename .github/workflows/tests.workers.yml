name: Worker Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/workers/**'
      - 'src/services/**'
      - 'src/repositories/**'
      - 'src/infrastructure/**'
      - 'src/shared/**'
      - 'package.json'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/workers/**'
      - 'src/services/**'
      - 'src/repositories/**'
      - 'src/infrastructure/**'
      - 'src/shared/**'
      - 'package.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Ejecutar Tests de Workers con Jest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar los tests de workers
        run: npx jest src/workers --runInBand --detectOpenHandles
