name: Core Engine Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/core/engines/**' # Solo se ejecuta si hay cambios en esta carpeta o sus subcarpetas
      - 'src/shared/types/**' # Puedes añadir más rutas si el motor depende de ellas

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/core/engines/**'
      - 'src/shared/types/**'

jobs:
  test:
    name: Ejecutar Tests con Jest
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🧪 Ejecutar los tests
        # Ejecutamos específicamente los tests del motor
        run: npx jest engine
